name: Playbook Checks

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Canonical playbook verification
        run: python tools/verify_playbook.py --root .

      - name: Compile Python helpers
        run: |
          python -m py_compile tools/*.py
          python -m py_compile templates/cost_adapters/python/telemetry_adapter.py

      - name: Validate JSON artifacts
        run: |
          python -m json.tool schemas/cost_telemetry_entry.schema.json >/dev/null
          python -m json.tool templates/COST_TELEMETRY_ENTRY.json >/dev/null

      - name: Smoke-test project initializer
        run: |
          python tools/init_playbook_project.py "$RUNNER_TEMP/playbook-smoke" \
            --mode strict \
            --project-name "Playbook Smoke" \
            --operational-pain "CI needs reproducible strict project bootstrap." \
            --current-workaround "Manual inspection of generated files." \
            --first-proof-metric "Generated strict project passes smoke checks." \
            --with-cost-architecture \
            --with-router-eval \
            --with-cost-adapter \
            --external-skill smoke-skill

      - name: External skill security gate
        run: python tools/skill_security_gate.py --root . --discover-agent-skills

      - name: Cost rollup smoke test
        run: |
          python tools/cost_rollup.py \
            --input "$RUNNER_TEMP/missing-cost.jsonl" \
            --output "$RUNNER_TEMP/ai_cost_rollup.md"

      - name: Integrity check
        run: python tools/integrity_check.py --root .
