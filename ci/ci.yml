name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "{{PYTHON_VERSION}}"

      - name: Install project dependencies
        run: |
          if [ -f requirements-dev.lock ]; then
            python -m pip install --require-hashes -r requirements-dev.lock
          elif [ -f requirements-dev.txt ]; then
            python -m pip install -r requirements-dev.txt
          else
            echo "No Python dependency lock found; relying on project verification command environment."
          fi

      - name: Project-level playbook validation
        run: python tools/playbook_validate.py --root . --check tasks --check placeholders

      - name: Project verification
        run: python tools/verify_project.py --root .

      - name: External skill security gate
        run: python tools/skill_security_gate.py --root . --discover-agent-skills
