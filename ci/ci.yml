name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:
    branches: ["master", "main"]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "{{PYTHON_VERSION}}"

      - name: Install test dependency
        run: python -m pip install pytest

      - name: Project-level playbook validation
        run: python tools/playbook_validate.py --root . --check tasks --check placeholders

      - name: Project verification
        run: "{{VERIFY_COMMAND}}"

      - name: External skill security gate
        run: python tools/skill_security_gate.py --root . --discover-agent-skills
